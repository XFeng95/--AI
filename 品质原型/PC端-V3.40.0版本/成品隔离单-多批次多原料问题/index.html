<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成品隔离单 - 多批次多原料问题</title>
  <style>
    :root {
      --primary: #0b9bd3;
      --primary-dark: #087fae;
      --primary-soft: #e7f6fc;
      --border: #d8e0e6;
      --text: #263746;
      --muted: #6f7f8d;
      --bg: #f3f6f8;
      --danger: #e45555;
      --warning: #f5a623;
      --success: #22a06b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      min-width: 1000px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: #fff;
      background: #123a63;
      box-shadow: 0 1px 4px rgba(20, 42, 64, .25);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
    .brand-mark { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 6px; background: var(--primary); }
    .top-meta { display: flex; gap: 18px; align-items: center; font-size: 13px; opacity: .9; }

    .page { min-width: 1000px; padding: 14px 18px 80px; }
    .breadcrumb { margin: 0 0 10px; color: var(--muted); }
    .breadcrumb strong { color: var(--text); }
    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .page-title { margin: 0; font-size: 20px; }
    .status { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; color: #8a5b00; background: #fff5d9; border-radius: 4px; }

    .actions {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(31, 54, 75, .08);
    }
    .btn {
      min-height: 32px;
      padding: 0 16px;
      color: #425466;
      background: #fff;
      border: 1px solid #bdc9d2;
      border-radius: 4px;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary-dark); }
    .btn-primary { color: #fff; background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { color: #fff; background: var(--primary-dark); }
    .btn-danger { color: var(--danger); border-color: #f2b9b9; }
    .btn-sm { min-height: 28px; padding: 0 10px; font-size: 13px; }
    .actions .spacer { flex: 1; }

    .panel {
      margin-top: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 45px;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }
    .panel-body { padding: 16px; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px 20px; }
    .field { min-width: 0; }
    .field.span-2 { grid-column: span 2; }
    .field.span-4 { grid-column: span 4; }
    .label { display: block; margin-bottom: 6px; color: #506171; }
    .required::before { content: "*"; margin-right: 3px; color: var(--danger); }
    .control {
      width: 100%;
      height: 34px;
      padding: 5px 9px;
      color: var(--text);
      background: #fff;
      border: 1px solid #bfcbd4;
      border-radius: 3px;
      outline: none;
    }
    .control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(11, 155, 211, .12); }
    textarea.control { height: 66px; resize: vertical; }
    .control.invalid { border-color: var(--danger); background: #fff8f8; }
    .hint { margin-top: 5px; color: var(--muted); font-size: 12px; }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .summary-card { padding: 14px 16px; background: #fff; border: 1px solid var(--border); border-radius: 5px; }
    .summary-card span { color: var(--muted); }
    .summary-card strong { display: block; margin-top: 6px; font-size: 24px; color: #123a63; }
    .summary-card.warning strong { color: var(--warning); }

    .batch-list { display: grid; gap: 12px; }
    .batch-card { overflow: hidden; border: 1px solid #b9ccd8; border-radius: 5px; background: #fff; }
    .batch-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #edf7fb;
      border-bottom: 1px solid #c9dce6;
    }
    .batch-index { display: grid; place-items: center; width: 28px; height: 28px; color: #fff; font-weight: 700; border-radius: 50%; background: var(--primary); }
    .batch-name { font-weight: 700; }
    .batch-meta { color: var(--muted); font-size: 13px; }
    .batch-head .spacer { flex: 1; }
    .batch-body { padding: 14px; }
    .batch-card.collapsed .batch-body { display: none; }
    .toggle-btn { width: 28px; height: 28px; padding: 0; color: var(--primary-dark); background: transparent; border: 0; font-size: 17px; }
    .batch-card.collapsed .toggle-btn { transform: rotate(-90deg); }

    .subsection-title { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 8px; font-weight: 700; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); }
    table { width: 100%; min-width: 1320px; border-collapse: collapse; table-layout: fixed; }
    th { height: 38px; padding: 7px; color: #45596a; background: #f5f8fa; font-weight: 600; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    td { padding: 7px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: 0; }
    th:last-child, td:last-child { border-right: 0; }
    td .control { min-width: 80px; }
    .row-no { text-align: center; color: var(--muted); }
    .empty-row { padding: 22px; text-align: center; color: var(--muted); }

    .footer-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 10px 22px;
      background: #fff;
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 8px rgba(31, 54, 75, .08);
    }
    .footer-tip { margin-right: auto; color: var(--muted); }
    .toast {
      position: fixed;
      top: 72px;
      left: 50%;
      z-index: 30;
      min-width: 280px;
      padding: 12px 18px;
      color: #fff;
      text-align: center;
      background: #263746;
      border-radius: 5px;
      box-shadow: 0 6px 20px rgba(20, 42, 64, .25);
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, top .2s;
    }
    .toast.show { top: 82px; opacity: 1; }
    .toast.error { background: var(--danger); }
    .tag { display: inline-block; padding: 3px 7px; border-radius: 10px; color: #06709a; background: #dff4fc; font-size: 12px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">品</span><span>品质管理系统</span></div>
    <div class="top-meta"><span>消息 16</span><span>管理员 ▾</span></div>
  </header>

  <main class="page">
    <p class="breadcrumb">首页 / 成品隔离管理 / <strong>新增成品隔离单</strong></p>
    <div class="page-head">
      <h1 class="page-title">新增成品隔离单</h1>
      <span class="status">● 草稿</span>
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="button" data-action="save">保存草稿</button>
      <button class="btn btn-primary" type="button" data-action="submit">签字提交</button>
      <button class="btn" type="button">签字复核</button>
      <button class="btn" type="button">撤回</button>
      <button class="btn" type="button">反审核</button>
      <button class="btn" type="button">删除</button>
      <span class="spacer"></span>
      <button class="btn" type="button">调整信息</button>
    </div>

    <section class="panel">
      <div class="panel-title"><span>基础信息</span><span class="tag">单据级</span></div>
      <div class="panel-body">
        <div class="form-grid">
          <label class="field"><span class="label">单据编号</span><input class="control" value="自动生成" disabled></label>
          <label class="field"><span class="label required">车间</span><select class="control required-control"><option value="">请选择</option><option selected>制造一车间</option><option>制造二车间</option></select></label>
          <label class="field"><span class="label required">班次</span><select class="control required-control"><option value="">请选择</option><option selected>白班</option><option>夜班</option></select></label>
          <label class="field"><span class="label required">生产班组</span><input class="control required-control" value="A班"></label>
          <label class="field"><span class="label required">当班生产主管</span><input class="control required-control" value="王主管"></label>
          <label class="field"><span class="label required">隔离日期</span><input class="control required-control" type="date" value="2026-06-24"></label>
          <label class="field"><span class="label required">工序化验品</span><input class="control required-control" value="功能饮料成品"></label>
          <label class="field"><span class="label required">处置类型</span><select class="control required-control"><option selected>原料异常隔离</option><option>工艺异常隔离</option><option>包装异常隔离</option></select></label>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title"><span>发现信息</span></div>
      <div class="panel-body">
        <div class="form-grid">
          <label class="field"><span class="label required">发现时间</span><input class="control required-control" type="datetime-local" value="2026-06-24T09:30"></label>
          <label class="field"><span class="label required">发现人员</span><input class="control required-control" value="张检验"></label>
          <label class="field"><span class="label required">发现不良位置</span><select class="control required-control"><option selected>成品暂存区</option><option>生产线</option><option>成品仓</option></select></label>
          <label class="field"><span class="label required">如何发现</span><select class="control required-control"><option selected>巡检发现</option><option>抽检发现</option><option>生产反馈</option></select></label>
          <label class="field"><span class="label required">生产线别</span><select class="control required-control"><option selected>1# 罐装线</option><option>2# 罐装线</option></select></label>
          <label class="field"><span class="label required">所属问题</span><select class="control required-control"><option selected>原料问题</option><option>包材问题</option><option>工艺问题</option></select></label>
          <label class="field span-2"><span class="label required">总体异常说明</span><input class="control required-control" value="多生产批次涉及原料追溯异常，需统一隔离处理"></label>
        </div>
      </div>
    </section>

    <div class="summary-strip">
      <div class="summary-card"><span>成品批次数</span><strong id="batchCount">2</strong></div>
      <div class="summary-card"><span>原料问题数</span><strong id="materialCount">3</strong></div>
      <div class="summary-card"><span>隔离总量（箱）</span><strong id="quantityTotal">620</strong></div>
      <div class="summary-card warning"><span>待完善必填项</span><strong id="missingCount">0</strong></div>
    </div>

    <section class="panel">
      <div class="panel-title">
        <span>成品批次与原料问题明细</span>
        <button class="btn btn-primary btn-sm" type="button" data-action="add-batch">+ 新增批次</button>
      </div>
      <div class="panel-body">
        <div class="batch-list" id="batchList"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title"><span>隔离结论</span></div>
      <div class="panel-body">
        <div class="form-grid">
          <label class="field span-2"><span class="label required">隔离原因</span><textarea class="control required-control">相关原料批次存在追溯或质量异常，在完成评审前统一隔离。</textarea></label>
          <label class="field span-2"><span class="label required">结论</span><textarea class="control required-control">按成品批次分区隔离，禁止出库，待原料调查结论后按批处置。</textarea></label>
          <label class="field span-4"><span class="label">备注</span><textarea class="control" placeholder="可补充审核、放行或返工要求"></textarea></label>
        </div>
      </div>
    </section>
  </main>

  <div class="footer-bar">
    <span class="footer-tip">提交前需完成所有批次和原料问题必填项</span>
    <button class="btn" type="button" data-action="save">保存草稿</button>
    <button class="btn btn-primary" type="button" data-action="submit">签字提交</button>
  </div>
  <div class="toast" id="toast"></div>

  <template id="batchTemplate">
    <article class="batch-card">
      <div class="batch-head">
        <span class="batch-index"></span>
        <div><div class="batch-name">成品批次</div><div class="batch-meta">未录入成品批号</div></div>
        <span class="spacer"></span>
        <button class="btn btn-sm" type="button" data-action="duplicate-batch">复制批次</button>
        <button class="btn btn-danger btn-sm" type="button" data-action="delete-batch">删除批次</button>
        <button class="toggle-btn" type="button" data-action="toggle-batch">▼</button>
      </div>
      <div class="batch-body">
        <div class="form-grid">
          <label class="field"><span class="label required">产品名称</span><select class="control batch-required product-name"><option>红牛维生素功能饮料</option><option>战马能量型饮料</option></select></label>
          <label class="field"><span class="label required">成品批次</span><input class="control batch-required batch-code" placeholder="请输入成品批次"></label>
          <label class="field"><span class="label required">生产日期</span><input class="control batch-required" type="date" value="2026-06-24"></label>
          <label class="field"><span class="label required">产线</span><select class="control batch-required"><option>1# 罐装线</option><option>2# 罐装线</option></select></label>
          <label class="field"><span class="label required">隔离数量（箱）</span><input class="control batch-required isolate-quantity" type="number" min="0" value="0"></label>
          <label class="field"><span class="label required">成品托盘号</span><input class="control batch-required" placeholder="支持多托盘号，逗号分隔"></label>
          <label class="field"><span class="label required">隔离位置</span><select class="control batch-required"><option>成品隔离区 A</option><option>成品隔离区 B</option></select></label>
          <label class="field"><span class="label required">对应成品箱号</span><input class="control batch-required" placeholder="例：001-320"></label>
        </div>

        <div class="subsection-title">
          <span>原料问题明细 <span class="tag material-tag">0 条</span></span>
          <button class="btn btn-primary btn-sm" type="button" data-action="add-material">+ 新增原料问题</button>
        </div>
        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width:50px"><col style="width:120px"><col style="width:150px"><col style="width:140px"><col style="width:130px"><col style="width:145px"><col style="width:130px"><col style="width:145px"><col style="width:220px"><col style="width:100px"><col style="width:72px">
            </colgroup>
            <thead><tr><th>序号</th><th>原料类型</th><th>原料名称</th><th>供应商</th><th>原料批号</th><th>领/投料时间</th><th>投料量</th><th>问题类别</th><th>问题描述</th><th>影响数量</th><th>操作</th></tr></thead>
            <tbody class="material-body"></tbody>
          </table>
        </div>
      </div>
    </article>
  </template>

  <template id="materialTemplate">
    <tr>
      <td class="row-no"></td>
      <td><select class="control material-required"><option value="">请选择</option><option selected>主料</option><option>辅料</option><option>包材</option></select></td>
      <td><input class="control material-required" placeholder="原料名称"></td>
      <td><input class="control material-required" placeholder="供应商"></td>
      <td><input class="control material-required" placeholder="原料批号"></td>
      <td><input class="control material-required" type="datetime-local" value="2026-06-24T08:00"></td>
      <td><input class="control material-required" type="number" min="0" value="0"></td>
      <td><select class="control material-required"><option value="">请选择</option><option selected>质量异常</option><option>追溯异常</option><option>使用错批</option><option>供应商召回</option></select></td>
      <td><input class="control material-required" placeholder="请输入具体问题"></td>
      <td><input class="control material-required affected-quantity" type="number" min="0" value="0"></td>
      <td><button class="btn btn-danger btn-sm" type="button" data-action="delete-material">删除</button></td>
    </tr>
  </template>

  <script>
    const batchList = document.querySelector('#batchList');
    const batchTemplate = document.querySelector('#batchTemplate');
    const materialTemplate = document.querySelector('#materialTemplate');
    const toast = document.querySelector('#toast');

    function renumber() {
      const batches = [...batchList.querySelectorAll('.batch-card')];
      batches.forEach((batch, batchIndex) => {
        batch.querySelector('.batch-index').textContent = batchIndex + 1;
        const code = batch.querySelector('.batch-code').value.trim();
        batch.querySelector('.batch-meta').textContent = code || '未录入成品批号';
        const rows = [...batch.querySelectorAll('.material-body tr')];
        rows.forEach((row, rowIndex) => row.querySelector('.row-no').textContent = rowIndex + 1);
        batch.querySelector('.material-tag').textContent = `${rows.length} 条`;
      });
      updateSummary();
    }

    function updateSummary() {
      const batches = [...batchList.querySelectorAll('.batch-card')];
      const materials = batchList.querySelectorAll('.material-body tr');
      const total = batches.reduce((sum, batch) => sum + Number(batch.querySelector('.isolate-quantity').value || 0), 0);
      const missing = [...document.querySelectorAll('.required-control, .batch-required, .material-required')]
        .filter(control => !String(control.value).trim()).length;
      document.querySelector('#batchCount').textContent = batches.length;
      document.querySelector('#materialCount').textContent = materials.length;
      document.querySelector('#quantityTotal').textContent = total.toLocaleString('zh-CN');
      document.querySelector('#missingCount').textContent = missing;
    }

    function addMaterial(batch, values = {}) {
      const row = materialTemplate.content.firstElementChild.cloneNode(true);
      const controls = row.querySelectorAll('input, select');
      if (values.name) controls[1].value = values.name;
      if (values.supplier) controls[2].value = values.supplier;
      if (values.lot) controls[3].value = values.lot;
      if (values.description) controls[7].value = values.description;
      if (values.amount !== undefined) controls[5].value = values.amount;
      if (values.affected !== undefined) controls[8].value = values.affected;
      batch.querySelector('.material-body').append(row);
      renumber();
    }

    function addBatch(values = {}) {
      const batch = batchTemplate.content.firstElementChild.cloneNode(true);
      batch.querySelector('.batch-code').value = values.code || '';
      batch.querySelector('.isolate-quantity').value = values.quantity || 0;
      const fields = batch.querySelectorAll('.batch-required');
      if (values.pallet) fields[5].value = values.pallet;
      if (values.boxes) fields[7].value = values.boxes;
      batchList.append(batch);
      const materials = values.materials || [{}];
      materials.forEach(item => addMaterial(batch, item));
      renumber();
      return batch;
    }

    function cloneBatch(source) {
      const values = [...source.querySelectorAll('.batch-required')].map(control => control.value);
      const clone = batchTemplate.content.firstElementChild.cloneNode(true);
      [...clone.querySelectorAll('.batch-required')].forEach((control, index) => control.value = values[index]);
      const targetBody = clone.querySelector('.material-body');
      [...source.querySelectorAll('.material-body tr')].forEach(sourceRow => {
        const row = materialTemplate.content.firstElementChild.cloneNode(true);
        const sourceValues = [...sourceRow.querySelectorAll('input, select')].map(control => control.value);
        [...row.querySelectorAll('input, select')].forEach((control, index) => control.value = sourceValues[index]);
        targetBody.append(row);
      });
      batchList.append(clone);
      renumber();
    }

    function validate(showErrors) {
      const batches = [...batchList.querySelectorAll('.batch-card')];
      let invalid = 0;
      document.querySelectorAll('.required-control, .batch-required, .material-required').forEach(control => {
        const isInvalid = !String(control.value).trim();
        if (showErrors) control.classList.toggle('invalid', isInvalid);
        if (isInvalid) invalid += 1;
      });
      batches.forEach(batch => {
        if (!batch.querySelector('.material-body tr')) invalid += 1;
      });
      updateSummary();
      return invalid;
    }

    function showToast(message, type = '') {
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.className = 'toast', 2200);
    }

    document.addEventListener('click', event => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      const batch = button.closest('.batch-card');
      if (action === 'add-batch') addBatch();
      if (action === 'duplicate-batch') cloneBatch(batch);
      if (action === 'delete-batch') {
        if (batchList.querySelectorAll('.batch-card').length === 1) return showToast('至少保留一个成品批次', 'error');
        batch.remove();
        renumber();
      }
      if (action === 'toggle-batch') batch.classList.toggle('collapsed');
      if (action === 'add-material') addMaterial(batch);
      if (action === 'delete-material') {
        const body = button.closest('.material-body');
        if (body.querySelectorAll('tr').length === 1) return showToast('每个批次至少保留一条原料问题', 'error');
        button.closest('tr').remove();
        renumber();
      }
      if (action === 'save') showToast('草稿已保存');
      if (action === 'submit') {
        const invalid = validate(true);
        showToast(invalid ? `还有 ${invalid} 个必填项待完善` : '校验通过，可进入签字提交', invalid ? 'error' : '');
        if (invalid) document.querySelector('.invalid')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

    document.addEventListener('input', event => {
      if (event.target.matches('.control')) {
        event.target.classList.remove('invalid');
        renumber();
      }
    });
