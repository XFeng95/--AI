<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>返工新增页面-多批次多原料</title>
    <link rel="stylesheet" href="multi-batch-material.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">Q</span>
          <span>品质管理系统</span>
        </div>
        <div class="user">
          <span>提交人：赵六</span>
          <span>创建时间：2026-07-06 10:10</span>
        </div>
      </header>

      <main class="page">
        <nav class="breadcrumb">
          <a href="3.1成品返工单列表页_多批次多原料.html">成品返工单</a>
          <span>&gt;</span>
          <span>新增/编辑</span>
        </nav>

        <section class="page-title">
          <h1>新增工序异常返工单</h1>
          <div class="title-extra">
            <a class="btn" href="1.2隔离新增_编辑_多批次多原料.html">查看来源隔离单</a>
            <a class="btn" href="3.1成品返工单列表页_多批次多原料.html">返回列表</a>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">来源隔离单</div>
            <span class="muted">由隔离单“发起返工”生成，来源字段不可编辑</span>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label>来源隔离单号</label>
                <input class="readonly" value="CGL20260706003" readonly />
              </div>
              <div class="field">
                <label>返工编号</label>
                <input id="reworkNo" class="readonly" value="FG20260706001" readonly />
              </div>
              <div class="field">
                <label>产品名称</label>
                <input class="readonly" value="红牛维生素功能饮料" readonly />
              </div>
              <div class="field">
                <label>生产线别</label>
                <input class="readonly" value="6线" readonly />
              </div>
              <div class="field">
                <label>隔离日期</label>
                <input class="readonly" value="2026-07-06" readonly />
              </div>
              <div class="field">
                <label>隔离批次数</label>
                <input class="readonly" value="3 批" readonly />
              </div>
              <div class="field">
                <label>来源原料问题数</label>
                <input class="readonly" value="6 条" readonly />
              </div>
              <div class="field">
                <label>来源隔离总量</label>
                <input class="readonly" value="186 罐" readonly />
              </div>
              <div class="field full">
                <label>来源问题摘要</label>
                <textarea class="readonly" readonly>多批次发现空罐变形、顶盖划伤、纸皮破损，已在隔离单中按批次登记对应原料问题，本返工单由该隔离单发起返工生成。</textarea>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">返工主信息</div>
            <span class="muted">返工编号自动生成：FG+年月日+3位流水号</span>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label for="reworkTime"><span class="required">*</span>返工时间</label>
                <input id="reworkTime" type="datetime-local" value="2026-07-06T10:30" />
              </div>
              <div class="field">
                <label for="reworkMethod"><span class="required">*</span>返工方式</label>
                <select id="reworkMethod">
                  <option value="">请选择</option>
                  <option selected>拆箱返工</option>
                  <option>在线返工</option>
                  <option>人工挑拣</option>
                  <option>报废处置</option>
                </select>
              </div>
              <div class="field">
                <label for="reworkOwner"><span class="required">*</span>返工方</label>
                <select id="reworkOwner">
                  <option value="">请选择</option>
                  <option selected>奥瑞金</option>
                  <option>运维</option>
                  <option>巡检员</option>
                  <option>生产班组</option>
                </select>
              </div>
              <div class="field">
                <label for="submitter">提交人</label>
                <input id="submitter" class="readonly" value="赵六" readonly />
              </div>
              <div class="field">
                <label for="needCan"><span class="required">*</span>是否补罐</label>
                <select id="needCan">
                  <option selected>是</option>
                  <option>否</option>
                </select>
              </div>
              <div class="field">
                <label for="needPallet"><span class="required">*</span>是否装箱码垛</label>
                <select id="needPallet">
                  <option selected>是</option>
                  <option>否</option>
                </select>
              </div>
              <div class="field">
                <label for="needShrink"><span class="required">*</span>是否热缩</label>
                <select id="needShrink">
                  <option>是</option>
                  <option selected>否</option>
                </select>
              </div>
              <div class="field">
                <label for="needStockIn"><span class="required">*</span>是否入库</label>
                <select id="needStockIn">
                  <option selected>是</option>
                  <option>否</option>
                </select>
              </div>
              <div class="field full">
                <label for="reworkDesc"><span class="required">*</span>返工描述</label>
                <textarea id="reworkDesc">根据来源隔离单，按成品批次分别返工处理；每批次对应原料问题保留追溯关系，返工完成后回写返工结果。</textarea>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">返工批次与原料问题</div>
            <div class="summary-strip">
              <span class="summary-item">返工批次：<strong id="sumBatch">0</strong></span>
              <span class="summary-item">返工箱数：<strong id="sumBoxQty">0</strong></span>
              <span class="summary-item">返工罐数：<strong id="sumReworkQty">0</strong></span>
              <span class="summary-item">报废罐数：<strong id="sumScrapQty">0</strong></span>
              <span class="summary-item">缺失必填：<strong id="sumMissing">0</strong></span>
            </div>
          </div>
          <div class="card-body">
            <div class="batch-toolbar">
              <div class="muted">批次基础信息由来源隔离单带入；实际返工信息和每条原料问题处理结果需要录入。</div>
            </div>
            <div id="batchContainer"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">签名与单据日志</div>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label for="operatorSign">返工人员签名</label>
                <input id="operatorSign" placeholder="签名后写入" />
              </div>
              <div class="field">
                <label for="submitSign">提交人签字</label>
                <input id="submitSign" class="readonly" value="赵六" readonly />
              </div>
              <div class="field">
                <label for="reviewSign">复核员签名</label>
                <input id="reviewSign" class="readonly" placeholder="签字复核后写入" readonly />
              </div>
              <div class="field">
                <label for="status">单据状态</label>
                <input id="status" class="readonly" value="暂存" readonly />
              </div>
              <div class="field full">
                <label>日志</label>
                <textarea class="readonly" readonly>2026-07-06 10:10 由隔离单 CGL20260706003 发起返工生成返工单 FG20260706001。</textarea>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer-bar">
        <div id="message" class="message">暂存状态，来源隔离单字段不可编辑，返工信息可补充。</div>
        <div class="title-extra">
          <button class="btn" type="button" id="saveBtn">保存</button>
          <button class="btn primary" type="button" id="submitBtn">签字提交</button>
          <button class="btn" type="button" id="reviewBtn">签字复核</button>
          <button class="btn" type="button" id="reportBtn">生成报告</button>
          <button class="btn danger" type="button" id="deleteBtn">删除</button>
        </div>
      </footer>
      <div id="boxModal" style="display:none;position:fixed;inset:0;z-index:20;background:rgba(15,23,42,0.35);align-items:center;justify-content:center;">
        <div class="card" style="width:min(920px,90vw);max-height:80vh;overflow:auto;margin:0;">
          <div class="card-header">
            <div class="card-title">对应成品箱号</div>
            <button class="btn ghost" type="button" id="closeBoxModal">关闭</button>
          </div>
          <div class="card-body">
            <div id="boxModalContent"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let batchSeq = 0;
      const sourceBatches = [
        {
          batchCode: "CP20260706001",
          lotNo: "LOT-RB-070601",
          boxNo: "BX0601-001~060",
          isolateQty: 60,
          actualBox: "RWBX0601-001~060",
          boxQty: 60,
          reworkQty: 60,
          scrapQty: 2,
          issues: [
            { machineTime: "08:45", materialBatch: "KG2026070108", factoryLine: "A线", supplier: "A供应商", sourceProblem: "罐身凹陷" },
            { machineTime: "09:10", materialBatch: "DG2026070203", factoryLine: "B线", supplier: "B供应商", sourceProblem: "外观划伤" }
          ]
        },
        {
          batchCode: "CP20260706002",
          lotNo: "LOT-RB-070602",
          boxNo: "BX0602-001~080",
          isolateQty: 80,
          actualBox: "RWBX0602-001~080",
          boxQty: 80,
          reworkQty: 80,
          scrapQty: 0,
          issues: [
            { machineTime: "10:20", materialBatch: "ZP2026070305", factoryLine: "C线", supplier: "C供应商", sourceProblem: "外箱纸皮破损" },
            { machineTime: "10:45", materialBatch: "KG2026070109", factoryLine: "A线", supplier: "A供应商", sourceProblem: "批号疑似混用" }
          ]
        },
        {
          batchCode: "CP20260706003",
          lotNo: "LOT-RB-070603",
          boxNo: "BX0603-001~046",
          isolateQty: 46,
          actualBox: "RWBX0603-001~046",
          boxQty: 46,
          reworkQty: 46,
          scrapQty: 1,
          issues: [
            { machineTime: "", materialBatch: "DG2026070204", factoryLine: "", supplier: "B供应商", sourceProblem: "盖面压痕" },
            { machineTime: "", materialBatch: "ZP2026070306", factoryLine: "", supplier: "C供应商", sourceProblem: "喷码不清" }
          ]
        }
      ];

      const batchContainer = document.querySelector("#batchContainer");
      const message = document.querySelector("#message");
      const boxModal = document.querySelector("#boxModal");
      const boxModalContent = document.querySelector("#boxModalContent");
      let activeBoxCard = null;

      function nextBatchId() {
        batchSeq += 1;
        return `rework-batch-${Date.now()}-${batchSeq}`;
      }

      function createIssueRow(issue = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="readonly" data-field="issueNo" readonly /></td>
          <td><input class="readonly" data-field="machineTime" type="time" value="${issue.machineTime || ""}" readonly /></td>
          <td><input class="readonly" data-field="materialBatch" value="${issue.materialBatch || ""}" readonly /></td>
          <td><input class="readonly" data-field="factoryLine" value="${issue.factoryLine || ""}" readonly /></td>
          <td><input class="readonly" data-field="supplier" value="${issue.supplier || ""}" readonly /></td>
          <td><textarea class="readonly" data-field="sourceProblem" readonly>${issue.sourceProblem || ""}</textarea></td>
        `;
        tr.querySelectorAll("input, select, textarea").forEach((field) => {
          field.addEventListener("input", updateSummary);
          field.addEventListener("change", updateSummary);
        });
        return tr;
      }

      function getSerialCount(startValue, endValue) {
        const start = Number(startValue || 0);
        const end = Number(endValue || 0);
        if (!start || !end) return 0;
        return end >= start ? end - start + 1 : 0;
      }

      function parseActualBoxSerials(actualBox) {
        const range = actualBox.trim().match(/(\d+)\s*[~～]\s*(\d+)$/);
        if (!range) return [{ start: "", end: "" }];
        return [{ start: Number(range[1]), end: Number(range[2]) }];
      }

      function createSerialRow(serial = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input data-field="serialStart" type="hidden" value="${serial.start || ""}" /></td>
          <td><input data-field="serialEnd" type="hidden" value="${serial.end || ""}" /></td>
        `;
        return tr;
      }

      function updateBoxFields(card) {
        const serials = Array.from(card.querySelectorAll("[data-role='serialBody'] tr")).map((row) => ({
          start: row.querySelector("[data-field='serialStart']").value,
          end: row.querySelector("[data-field='serialEnd']").value
        }));
        const total = serials.reduce((sum, serial) => sum + getSerialCount(serial.start, serial.end), 0);
        const actualBox = card.querySelector("[data-field='actualBox']");
        const original = actualBox.value.trim();
        if (actualBox.dataset.prefix === undefined) {
          const match = original.match(/^(.*?)(\d+)\s*[~～]\s*(\d+)$/);
          actualBox.dataset.prefix = match ? match[1] : "";
          actualBox.dataset.serialWidth = match ? match[2].length : "1";
        }
        const prefix = actualBox.dataset.prefix;
        const width = Number(actualBox.dataset.serialWidth);
        const summaries = serials
          .filter((serial) => serial.start || serial.end)
          .map((serial) => `${prefix}${String(serial.start || "").padStart(width, "0")}~${String(serial.end || "").padStart(width, "0")}`);
        actualBox.value = summaries.length ? summaries.join("；") : "";
        card.querySelector("[data-field='boxQty']").value = total;
      }

      function openBoxModal(card) {
        activeBoxCard = card;
        const batch = readBatch(card);
        const rows = Array.from(card.querySelectorAll("[data-role='serialBody'] tr")).map((row) => ({
          start: row.querySelector("[data-field='serialStart']").value,
          end: row.querySelector("[data-field='serialEnd']").value
        }));
        boxModalContent.innerHTML = `
          <div class="muted" style="margin-bottom:10px;">成品批次：${batch.batchCode || "-"}　成品批号：${batch.lotNo || "-"}　隔离数量：${batch.boxQty || 0} 箱</div>
          <div class="table-wrap">
            <table class="editable-table">
              <thead>
                <tr>
                  <th style="width:80px;">序号</th>
                  <th style="width:120px;">操作</th>
                  <th><span class="required">*</span>箱序列号</th>
                  <th style="width:120px;">隔离数量</th>
                  <th style="width:90px;">单位</th>
                </tr>
              </thead>
              <tbody data-role="modalSerialBody"></tbody>
            </table>
          </div>
          <div class="actions">
            <button class="btn" type="button" data-action="cancelBoxModal">取消</button>
            <button class="btn primary" type="button" data-action="confirmBoxModal">确认</button>
          </div>
        `;
        const modalBody = boxModalContent.querySelector("[data-role='modalSerialBody']");
        const sourceRows = rows.length ? rows : [{ start: "", end: "" }];
        sourceRows.forEach((item) => modalBody.appendChild(createModalSerialRow(item)));
        updateModalSerialRows();
        boxModalContent.querySelector("[data-action='cancelBoxModal']").addEventListener("click", closeBoxModal);
        boxModalContent.querySelector("[data-action='confirmBoxModal']").addEventListener("click", confirmBoxModal);
        boxModal.style.display = "flex";
      }

      function createModalSerialRow(serial = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="readonly" data-field="modalSerialNo" readonly /></td>
          <td>
            <button class="btn ghost" type="button" data-action="removeModalSerial">删除</button>
            <button class="btn ghost" type="button" data-action="addModalSerial">新增</button>
          </td>
          <td>
            <input data-field="modalSerialStart" type="number" min="1" max="1500" value="${serial.start || ""}" style="width:120px;" />
            <span>—</span>
            <input data-field="modalSerialEnd" type="number" min="1" max="1500" value="${serial.end || ""}" style="width:120px;" />
          </td>
          <td><input class="readonly" data-field="modalSerialQty" readonly /></td>
          <td><input class="readonly" value="箱" readonly /></td>
        `;
        tr.querySelectorAll("[data-field='modalSerialStart'], [data-field='modalSerialEnd']").forEach((field) => {
          field.addEventListener("input", updateModalSerialRows);
        });
        tr.querySelector("[data-action='removeModalSerial']").addEventListener("click", () => {
          const body = tr.closest("[data-role='modalSerialBody']");
          if (body.querySelectorAll("tr").length === 1) {
            tr.querySelector("[data-field='modalSerialStart']").value = "";
            tr.querySelector("[data-field='modalSerialEnd']").value = "";
          } else {
            tr.remove();
          }
          updateModalSerialRows();
        });
        tr.querySelector("[data-action='addModalSerial']").addEventListener("click", () => {
          const body = tr.closest("[data-role='modalSerialBody']");
          const lastEnd = Math.max(0, ...Array.from(body.querySelectorAll("[data-field='modalSerialEnd']")).map((item) => Number(item.value || 0)));
          const start = Math.min(lastEnd + 1, 1500);
          const end = Math.min(start + 149, 1500);
          body.appendChild(createModalSerialRow({ start, end }));
          updateModalSerialRows();
        });
        return tr;
      }

      function updateModalSerialRows() {
        boxModalContent.querySelectorAll("[data-role='modalSerialBody'] tr").forEach((row, index) => {
          const start = row.querySelector("[data-field='modalSerialStart']").value;
          const end = row.querySelector("[data-field='modalSerialEnd']").value;
          row.querySelector("[data-field='modalSerialNo']").value = index + 1;
          row.querySelector("[data-field='modalSerialQty']").value = getSerialCount(start, end);
        });
      }

      function closeBoxModal() {
        boxModal.style.display = "none";
        activeBoxCard = null;
      }

      function confirmBoxModal() {
        if (!activeBoxCard) {
          closeBoxModal();
          return;
        }
        const serialBody = activeBoxCard.querySelector("[data-role='serialBody']");
        serialBody.innerHTML = "";
        boxModalContent.querySelectorAll("[data-role='modalSerialBody'] tr").forEach((row) => {
          serialBody.appendChild(createSerialRow({
            start: Number(row.querySelector("[data-field='modalSerialStart']").value || 0),
            end: Number(row.querySelector("[data-field='modalSerialEnd']").value || 0)
          }));
        });
        updateBoxFields(activeBoxCard);
        updateSummary();
        closeBoxModal();
      }

      function createBatchCard(batch = {}) {
        const card = document.createElement("div");
        card.className = "batch-card";
        card.dataset.batchId = nextBatchId();
        card.innerHTML = `
          <div class="batch-head">
            <div class="batch-title">
              <span class="batch-index"></span>
              <span>返工批次</span>
              <span class="muted batch-brief"></span>
            </div>
          </div>
          <div class="batch-body">
            <div class="form-grid">
              <div class="field">
                <label>来源成品批次</label>
                <input class="readonly" data-field="batchCode" value="${batch.batchCode || ""}" readonly />
              </div>
              <div class="field">
                <label>来源成品批号</label>
                <input class="readonly" data-field="lotNo" value="${batch.lotNo || ""}" readonly />
              </div>
              <div class="field">
                <label>来源成品箱号</label>
                <input class="readonly" data-field="boxNo" value="${batch.boxNo || ""}" readonly />
              </div>
              <div class="field">
                <label>来源隔离数量</label>
                <input class="readonly" data-field="isolateQty" type="number" value="${batch.isolateQty || 0}" readonly />
              </div>
              <div class="field">
                <label><span class="required">*</span>实际返工箱号</label>
                <input class="readonly" data-field="actualBox" value="${batch.actualBox || ""}" placeholder="点击查看箱序列号" readonly style="cursor:pointer;" />
              </div>
              <div class="field">
                <label><span class="required">*</span>返工箱数</label>
                <input class="readonly" data-field="boxQty" type="number" min="0" value="${batch.boxQty || 0}" readonly />
              </div>
              <div class="field">
                <label><span class="required">*</span>返工罐数</label>
                <input data-field="reworkQty" type="number" min="0" value="${batch.reworkQty || 0}" />
              </div>
              <div class="field">
                <label>报废数量（罐）</label>
                <input data-field="scrapQty" type="number" min="0" value="${batch.scrapQty || 0}" />
              </div>
              <div class="field">
                <label>问题罐数</label>
                <input data-field="problemQty" type="number" min="0" value="${batch.problemQty || 0}" />
              </div>
              <div class="field">
                <label>其他问题罐数</label>
                <input class="readonly" data-field="otherProblemQty" type="number" min="0" value="${batch.otherProblemQty || 0}" readonly />
              </div>
              <div style="display:none;">
                <table>
                  <tbody data-role="serialBody"></tbody>
                </table>
              </div>
            </div>
            <div class="sub-title">
              <span>对应原料问题与返工处理</span>
            </div>
            <div class="table-wrap">
              <table class="editable-table">
                <thead>
                  <tr>
                    <th style="width:70px;">序号</th>
                    <th style="width:110px;">上机时间</th>
                    <th style="width: 150px;">原厂批次</th>
                    <th style="width: 100px;">厂线</th>
                    <th style="width: 126px;">供应商</th>
                    <th>问题描述</th>
                  </tr>
                </thead>
                <tbody data-role="issueBody"></tbody>
              </table>
            </div>
          </div>
        `;

        const issueBody = card.querySelector("[data-role='issueBody']");
        const issues = batch.issues && batch.issues.length ? batch.issues : [{}];
        issues.forEach((issue) => issueBody.appendChild(createIssueRow(issue)));
        issueBody.querySelectorAll("tr").forEach((row, index) => {
          row.querySelector("[data-field='issueNo']").value = index + 1;
        });
        const serialBody = card.querySelector("[data-role='serialBody']");
        parseActualBoxSerials(batch.actualBox || "").forEach((serial) => serialBody.appendChild(createSerialRow(serial)));
        updateBoxFields(card);
        updateProblemFields(card);

        card.querySelectorAll("input, select, textarea").forEach((field) => {
          field.addEventListener("input", updateSummary);
          field.addEventListener("change", updateSummary);
        });
        card.querySelector("[data-field='actualBox']").addEventListener("click", () => openBoxModal(card));
        return card;
      }

      function updateProblemFields(card) {
        const scrapQty = Number(card.querySelector("[data-field='scrapQty']").value || 0);
        const problemQty = Number(card.querySelector("[data-field='problemQty']").value || 0);
        card.querySelector("[data-field='otherProblemQty']").value = Math.max(scrapQty - problemQty, 0);
      }

      function readBatch(card) {
        updateProblemFields(card);
        const get = (field) => card.querySelector(`[data-field="${field}"]`).value.trim();
        const issues = Array.from(card.querySelectorAll("[data-role='issueBody'] tr")).map((row) => ({
          machineTime: row.querySelector("[data-field='machineTime']").value,
          materialBatch: row.querySelector("[data-field='materialBatch']").value.trim(),
          factoryLine: row.querySelector("[data-field='factoryLine']").value.trim(),
          supplier: row.querySelector("[data-field='supplier']").value.trim(),
          sourceProblem: row.querySelector("[data-field='sourceProblem']").value.trim()
        }));
        return {
          batchCode: get("batchCode"),
          lotNo: get("lotNo"),
          boxNo: get("boxNo"),
          isolateQty: Number(get("isolateQty") || 0),
          actualBox: get("actualBox"),
          boxQty: Number(get("boxQty") || 0),
          reworkQty: Number(get("reworkQty") || 0),
          scrapQty: Number(get("scrapQty") || 0),
          problemQty: Number(get("problemQty") || 0),
          otherProblemQty: Number(get("otherProblemQty") || 0),
          issues
        };
      }

      function validateBatch(batch) {
        let missing = 0;
        if (!batch.actualBox) missing += 1;
        if (!batch.boxQty) missing += 1;
        if (!batch.reworkQty) missing += 1;
        batch.issues.forEach((issue) => {
          if (!issue.materialBatch) missing += 1;
          if (!issue.sourceProblem) missing += 1;
        });
        return missing;
      }

      function readAllBatches() {
        return Array.from(document.querySelectorAll(".batch-card")).map(readBatch);
      }

      function updateSummary() {
        const list = readAllBatches();
        const boxQty = list.reduce((sum, item) => sum + item.boxQty, 0);
        const reworkQty = list.reduce((sum, item) => sum + item.reworkQty, 0);
        const scrapQty = list.reduce((sum, item) => sum + item.scrapQty, 0);
        const missing = list.reduce((sum, item) => sum + validateBatch(item), 0);
        document.querySelector("#sumBatch").textContent = list.length;
        document.querySelector("#sumBoxQty").textContent = boxQty;
        document.querySelector("#sumReworkQty").textContent = reworkQty;
        document.querySelector("#sumScrapQty").textContent = scrapQty;
        document.querySelector("#sumMissing").textContent = missing;
        document.querySelectorAll(".batch-card").forEach((card, index) => {
          const batch = readBatch(card);
          card.querySelector(".batch-index").textContent = index + 1;
          card.querySelector(".batch-brief").textContent = `${batch.batchCode || "新增批次"} / 返工 ${batch.reworkQty || 0} 罐`;
        });
      }

      function validateBase() {
        const fields = ["reworkTime", "reworkMethod", "reworkOwner", "needCan", "needPallet", "needShrink", "needStockIn", "reworkDesc"];
        return fields.filter((id) => !document.querySelector(`#${id}`).value.trim()).length;
      }

      function showMessage(text, type = "") {
        message.textContent = text;
        message.className = `message ${type}`;
      }

      function submitForm() {
        const missing = validateBase() + readAllBatches().reduce((sum, item) => sum + validateBatch(item), 0);
        if (missing > 0) {
          showMessage(`提交失败：仍有 ${missing} 个必填项未完善。`, "error");
          updateSummary();
          return;
        }
        document.querySelector("#status").value = "待审核";
        showMessage("原型动作：签字提交成功，单据状态变更为待审核。", "success");
      }

      document.querySelector("#saveBtn").addEventListener("click", () => {
        showMessage("原型动作：已保存返工单草稿。", "success");
      });
      document.querySelector("#submitBtn").addEventListener("click", submitForm);
      document.querySelector("#reviewBtn").addEventListener("click", () => {
        document.querySelector("#reviewSign").value = "复核员A";
        document.querySelector("#status").value = "已审核";
        showMessage("原型动作：签字复核成功，来源工序异常记录处理进度可同步更新。", "success");
      });
      document.querySelector("#reportBtn").addEventListener("click", () => {
        showMessage("原型动作：生成返工报告，包含来源隔离单、批次返工明细和原料问题处理结果。", "success");
      });
      document.querySelector("#deleteBtn").addEventListener("click", () => {
        showMessage("原型动作：暂存状态可删除，删除时同步删除返工批次与原料问题明细。", "error");
      });
      document.querySelector("#closeBoxModal").addEventListener("click", closeBoxModal);
      boxModal.addEventListener("click", (event) => {
        if (event.target === boxModal) {
          closeBoxModal();
        }
      });

      sourceBatches.forEach((batch) => batchContainer.appendChild(createBatchCard(batch)));
      updateSummary();
    </script>
  </body>
</html>
