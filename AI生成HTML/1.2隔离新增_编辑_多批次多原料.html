<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隔离新增编辑-多批次多原料</title>
    <link rel="stylesheet" href="multi-batch-material.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">Q</span>
          <span>品质管理系统</span>
        </div>
        <div class="user">
          <span>制单人：张三</span>
          <span>创建时间：2026-07-06 09:30</span>
        </div>
      </header>

      <main class="page">
        <nav class="breadcrumb">
          <a href="1.1成品隔离单列表页_多批次多原料.html">成品隔离单</a>
          <span>&gt;</span>
          <span>新增/编辑</span>
        </nav>

        <section class="page-title">
          <h1>新增成品隔离单</h1>
          <div class="title-extra">
            <a class="btn" href="1.1成品隔离单列表页_多批次多原料.html">返回列表</a>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">基础信息</div>
            <span class="muted">单据编号自动生成：CGL+年月日+3位流水号</span>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label for="docNo">单据编号</label>
                <input id="docNo" class="readonly" value="CGL20260706004" readonly />
              </div>
              <div class="field">
                <label for="isolateDate"><span class="required">*</span>隔离日期</label>
                <input id="isolateDate" type="date" value="2026-07-06" />
              </div>
              <div class="field">
                <label for="shift"><span class="required">*</span>班次</label>
                <select id="shift">
                  <option value="">请选择</option>
                  <option selected>早</option>
                  <option>中</option>
                  <option>晚</option>
                </select>
              </div>
              <div class="field">
                <label for="team"><span class="required">*</span>生产班组</label>
                <input id="team" value="A组" />
              </div>
              <div class="field">
                <label for="supervisor"><span class="required">*</span>当班生产主管</label>
                <input id="supervisor" value="李主管" />
              </div>
              <div class="field">
                <label for="workshop"><span class="required">*</span>车间</label>
                <select id="workshop">
                  <option value="">请选择</option>
                  <option selected>一车间</option>
                  <option>二车间</option>
                </select>
              </div>
              <div class="field">
                <label for="type"><span class="required">*</span>类型</label>
                <input id="type" class="readonly" value="处置类型" readonly />
              </div>
              <div class="field">
                <label for="chemist"><span class="required">*</span>工序化验员</label>
                <input id="chemist" value="张三" />
              </div>
              <div class="field">
                <label for="exceptionNo">异常记录单号</label>
                <input id="exceptionNo" class="readonly" placeholder="提交工序异常记录后反写" readonly />
              </div>
              <div class="field">
                <label for="reworkNo">返工单号</label>
                <input id="reworkNo" class="readonly" placeholder="发起返工后反写" readonly />
              </div>
              <div class="field wide">
                <label for="productName"><span class="required">*</span>产品名称</label>
                <select id="productName">
                  <option value="">请选择</option>
                  <option selected>红牛维生素功能饮料</option>
                  <option>红牛维生素功能饮料（牛磺酸强化型）</option>
                  <option>战马能量型维生素饮料</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">发现信息</div>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label for="foundTime">发现时间</label>
                <input id="foundTime" type="datetime-local" value="2026-07-06T08:45" />
              </div>
              <div class="field">
                <label for="foundPerson">发现人员</label>
                <input id="foundPerson" value="王五" />
              </div>
              <div class="field">
                <label for="badLocation">发现不良品位置</label>
                <select id="badLocation">
                  <option>请选择</option>
                  <option selected>灌装-查罐</option>
                  <option>冷却机后</option>
                  <option>包装</option>
                  <option>码垛</option>
                </select>
              </div>
              <div class="field">
                <label for="foundBy">如何发现</label>
                <select id="foundBy">
                  <option>请选择</option>
                  <option selected>人员岗位自检</option>
                  <option>互检</option>
                  <option>专检</option>
                  <option>仪器报警</option>
                </select>
              </div>
              <div class="field">
                <label for="foundQty">发现数量</label>
                <div style="display:flex;align-items:center;gap:6px;">
                  <input id="foundQty" type="number" min="0" value="186" />
                  <span class="muted">罐</span>
                </div>
              </div>
              <div class="field">
                <label for="belongProblem">所属问题</label>
                <select id="belongProblem" title="取值来源：基础信息-不良类型管理">
                  <option selected>请选取</option>
                </select>
              </div>
              <div class="field">
                <label for="badCategory">不良大类</label>
                <select id="badCategory" title="取值来源：基础信息-不良类型管理">
                  <option selected>请选取</option>
                </select>
              </div>
              <div class="field">
                <label for="badType">不良类型</label>
                <select id="badType" title="取值来源：基础信息-不良类型管理">
                  <option selected>请选取</option>
                </select>
              </div>
              <div class="field">
                <label for="verifyInfo">验证信息</label>
                <select id="verifyInfo">
                  <option>请选择</option>
                  <option selected>已验证</option>
                  <option>未验证</option>
                  <option>已报警</option>
                  <option>已剔除</option>
                </select>
              </div>
              <div class="field">
                <label for="line">生产线别</label>
                <select id="line">
                  <option>1线</option>
                  <option>2线</option>
                  <option selected>6线</option>
                  <option>10线</option>
                </select>
              </div>
              <div class="field">
                <label for="sceneImage">现场图片</label>
                <input id="sceneImage" placeholder="点击上传图片" />
              </div>
              <div class="field full">
                <label for="badDesc">不良描述</label>
                <textarea id="badDesc">多批次成品发现外观异常，需逐批隔离并登记对应原料问题。</textarea>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">隔离信息与原料问题</div>
            <div class="summary-strip">
              <span class="summary-item">成品批次：<strong id="sumBatch">0</strong></span>
              <span class="summary-item">原料问题：<strong id="sumIssue">0</strong></span>
              <span class="summary-item">隔离总量：<strong id="sumQty">0</strong> 箱</span>
              <span class="summary-item">缺失必填：<strong id="sumMissing">0</strong></span>
            </div>
          </div>
          <div class="card-body">
            <div class="batch-toolbar">
              <div class="muted">每个成品批次可录入多条对应原料问题；提交时校验批次基础字段和原料问题必填项。</div>
              <button class="btn primary" type="button" id="addBatchBtn">新增成品批次</button>
            </div>
            <div id="batchContainer"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">结论与备注</div>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label for="result"><span class="required">*</span>隔离结果</label>
                <select id="result">
                  <option selected>隔离中</option>
                  <option>无需返工</option>
                  <option>已发起返工</option>
                </select>
              </div>
              <div class="field">
                <label for="qaSign">工序化验员签字</label>
                <input id="qaSign" class="readonly" value="张三" readonly />
              </div>
              <div class="field">
                <label for="reviewSign">复核员签名</label>
                <input id="reviewSign" class="readonly" placeholder="签字复核后写入" readonly />
              </div>
              <div class="field full">
                <label for="remark">备注</label>
                <textarea id="remark">支持同一隔离单内维护多批次，每个批次下可维护多条原料问题。</textarea>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer-bar">
        <div id="message" class="message">暂存状态，支持继续补充批次和原料问题。</div>
        <div class="title-extra">
          <button class="btn" type="button" id="saveBtn">保存</button>
          <button class="btn primary" type="button" id="submitBtn">签字提交</button>
          <button class="btn" type="button" id="reviewBtn">签字复核</button>
          <button class="btn" type="button" id="reworkBtn">发起返工</button>
          <button class="btn" type="button" id="noReworkBtn">无需返工</button>
          <button class="btn danger" type="button" id="deleteBtn">删除</button>
        </div>
      </footer>
      <div id="boxModal" style="display:none;position:fixed;inset:0;z-index:20;background:rgba(15,23,42,0.35);align-items:center;justify-content:center;">
        <div class="card" style="width:min(920px,90vw);max-height:80vh;overflow:auto;margin:0;">
          <div class="card-header">
            <div class="card-title">对应成品箱号</div>
            <button class="btn ghost" type="button" id="closeBoxModal">关闭</button>
          </div>
          <div class="card-body">
            <div id="boxModalContent"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let batchSeq = 0;
      const batches = [
        {
          batchCode: "CP20260706001",
          lotNo: "LOT-RB-070601",
          boxSerials: [{}],
          isolateQty: 0,
          isolateReason: "空罐变形，顶盖划伤",
          conclusion: "隔离观察",
          issues: [
            { machineTime: "08:45", materialBatch: "KG2026070108", supplier: "A供应商", problem: "罐身凹陷" },
            { machineTime: "09:10", materialBatch: "DG2026070203", supplier: "B供应商", problem: "外观划伤" }
          ]
        },
        {
          batchCode: "CP20260706002",
          lotNo: "LOT-RB-070602",
          boxSerials: [{}],
          isolateQty: 0,
          isolateReason: "纸皮破损，空罐疑似混批",
          conclusion: "发起复核",
          issues: [
            { machineTime: "10:20", materialBatch: "ZP2026070305", supplier: "C供应商", problem: "外箱纸皮破损" },
            { machineTime: "10:45", materialBatch: "KG2026070109", supplier: "A供应商", problem: "批号疑似混用" }
          ]
        }
      ];

      const batchContainer = document.querySelector("#batchContainer");
      const message = document.querySelector("#message");
      const boxModal = document.querySelector("#boxModal");
      const boxModalContent = document.querySelector("#boxModalContent");
      let activeBoxCard = null;

      function nextBatchId() {
        batchSeq += 1;
        return `batch-${Date.now()}-${batchSeq}`;
      }

      function getSerialCount(startValue, endValue) {
        const start = Number(startValue || 0);
        const end = Number(endValue || 0);
        return end >= start ? end - start + 1 : 0;
      }

      function updateBatchQty(card) {
        const total = Array.from(card.querySelectorAll("[data-role='serialBody'] tr")).reduce((sum, row) => {
          const start = row.querySelector("[data-field='serialStart']").value;
          const end = row.querySelector("[data-field='serialEnd']").value;
          return sum + getSerialCount(start, end);
        }, 0);
        const qtyInput = card.querySelector("[data-field='isolateQty']");
        qtyInput.value = total;
      }

      function getBoxSerialSummary(card) {
        const rows = Array.from(card.querySelectorAll("[data-role='serialBody'] tr")).map((row, index) => {
          const start = row.querySelector("[data-field='serialStart']").value;
          const end = row.querySelector("[data-field='serialEnd']").value;
          const qty = getSerialCount(start, end);
          return { index: index + 1, start, end, qty };
        }).filter((item) => item.start || item.end);
        if (!rows.length) return "点击查看箱序列号";
        return rows.map((item) => `${item.start || "-"}-${item.end || "-"}箱号`).join("；");
      }

      function openBoxModal(card) {
        activeBoxCard = card;
        const batch = readBatch(card);
        const rows = Array.from(card.querySelectorAll("[data-role='serialBody'] tr")).map((row, index) => {
          const start = row.querySelector("[data-field='serialStart']").value;
          const end = row.querySelector("[data-field='serialEnd']").value;
          const qty = getSerialCount(start, end);
          return { index: index + 1, start, end, qty };
        });
        boxModalContent.innerHTML = `
          <div class="muted" style="margin-bottom:10px;">成品批次：${batch.batchCode || "-"}　成品批号：${batch.lotNo || "-"}　隔离数量：${batch.isolateQty || 0} 箱</div>
          <div class="table-wrap">
            <table class="editable-table">
              <thead>
                <tr>
                  <th style="width:80px;">序号</th>
                  <th style="width:120px;">操作</th>
                  <th><span class="required">*</span>箱序列号</th>
                  <th style="width:120px;">隔离数量</th>
                  <th style="width:90px;">单位</th>
                </tr>
              </thead>
              <tbody data-role="modalSerialBody"></tbody>
            </table>
          </div>
          <div class="actions">
            <button class="btn" type="button" data-action="cancelBoxModal">取消</button>
            <button class="btn primary" type="button" data-action="confirmBoxModal">确认</button>
          </div>
        `;
        const modalBody = boxModalContent.querySelector("[data-role='modalSerialBody']");
        const sourceRows = rows.length ? rows : [{ start: "", end: "" }];
        sourceRows.forEach((item) => modalBody.appendChild(createModalSerialRow(item)));
        updateModalSerialRows();
        boxModalContent.querySelector("[data-action='cancelBoxModal']").addEventListener("click", closeBoxModal);
        boxModalContent.querySelector("[data-action='confirmBoxModal']").addEventListener("click", confirmBoxModal);
        boxModal.style.display = "flex";
      }

      function createModalSerialRow(serial = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="readonly" data-field="modalSerialNo" readonly /></td>
          <td>
            <button class="btn ghost" type="button" data-action="removeModalSerial">删除</button>
            <button class="btn ghost" type="button" data-action="addModalSerial">新增</button>
          </td>
          <td>
            <input data-field="modalSerialStart" type="number" min="1" max="1500" value="${serial.start || ""}" style="width: 120px;" />
            <span>—</span>
            <input data-field="modalSerialEnd" type="number" min="1" max="1500" value="${serial.end || ""}" style="width: 120px;" />
          </td>
          <td><input class="readonly" data-field="modalSerialQty" readonly /></td>
          <td><input class="readonly" value="箱" readonly /></td>
        `;
        tr.querySelectorAll("[data-field='modalSerialStart'], [data-field='modalSerialEnd']").forEach((field) => {
          field.addEventListener("input", updateModalSerialRows);
        });
        tr.querySelector("[data-action='removeModalSerial']").addEventListener("click", () => {
          const body = tr.closest("[data-role='modalSerialBody']");
          if (body.querySelectorAll("tr").length === 1) {
            tr.querySelector("[data-field='modalSerialStart']").value = "";
            tr.querySelector("[data-field='modalSerialEnd']").value = "";
          } else {
            tr.remove();
          }
          updateModalSerialRows();
        });
        tr.querySelector("[data-action='addModalSerial']").addEventListener("click", () => {
          const body = tr.closest("[data-role='modalSerialBody']");
          const lastEnd = Math.max(0, ...Array.from(body.querySelectorAll("[data-field='modalSerialEnd']")).map((item) => Number(item.value || 0)));
          const start = Math.min(lastEnd + 1, 1500);
          const end = Math.min(start + 149, 1500);
          body.appendChild(createModalSerialRow({ start, end }));
          updateModalSerialRows();
        });
        return tr;
      }

      function updateModalSerialRows() {
        const rows = boxModalContent.querySelectorAll("[data-role='modalSerialBody'] tr");
        rows.forEach((row, index) => {
          const start = row.querySelector("[data-field='modalSerialStart']").value;
          const end = row.querySelector("[data-field='modalSerialEnd']").value;
          row.querySelector("[data-field='modalSerialNo']").value = index + 1;
          row.querySelector("[data-field='modalSerialQty']").value = getSerialCount(start, end);
        });
      }

      function closeBoxModal() {
        boxModal.style.display = "none";
        activeBoxCard = null;
      }

      function confirmBoxModal() {
        if (!activeBoxCard) {
          closeBoxModal();
          return;
        }
        const serialBody = activeBoxCard.querySelector("[data-role='serialBody']");
        const modalRows = Array.from(boxModalContent.querySelectorAll("[data-role='modalSerialBody'] tr"));
        serialBody.innerHTML = "";
        modalRows.forEach((row) => {
          const start = Number(row.querySelector("[data-field='modalSerialStart']").value || 0);
          const end = Number(row.querySelector("[data-field='modalSerialEnd']").value || 0);
          serialBody.appendChild(createSerialRow({ start, end }, activeBoxCard));
        });
        if (!modalRows.length) {
          serialBody.appendChild(createSerialRow({}, activeBoxCard));
        }
        updateSerialRows(activeBoxCard);
        updateSummary();
        closeBoxModal();
      }

      function updateSerialRows(card) {
        card.querySelectorAll("[data-role='serialBody'] tr").forEach((row, index) => {
          row.querySelector("[data-field='serialNo']").value = index + 1;
          const start = row.querySelector("[data-field='serialStart']").value;
          const end = row.querySelector("[data-field='serialEnd']").value;
          row.querySelector("[data-field='inboundQty']").value = getSerialCount(start, end);
        });
        updateBatchQty(card);
        card.querySelector("[data-field='boxSummary']").value = getBoxSerialSummary(card);
      }

      function createSerialRow(serial = {}, card) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="readonly" data-field="serialNo" readonly /></td>
          <td>
            <button class="btn ghost" type="button" data-action="removeSerial">删除</button>
            <button class="btn ghost" type="button" data-action="addSerial">新增</button>
          </td>
          <td><input class="readonly" data-field="inboundQty" readonly /></td>
          <td>
            <input data-field="serialStart" type="number" min="1" max="1500" value="${serial.start || ""}" style="width: 120px;" />
            <span>—</span>
            <input data-field="serialEnd" type="number" min="1" max="1500" value="${serial.end || ""}" style="width: 120px;" />
          </td>
          <td><input class="readonly" data-field="unit" value="CAR" readonly /></td>
        `;
        tr.querySelectorAll("[data-field='serialStart'], [data-field='serialEnd']").forEach((field) => {
          field.addEventListener("input", () => {
            updateSerialRows(card);
            updateSummary();
          });
        });
        tr.querySelector("[data-action='removeSerial']").addEventListener("click", () => {
          const body = tr.closest("[data-role='serialBody']");
          if (body.querySelectorAll("tr").length === 1) {
            tr.querySelector("[data-field='serialStart']").value = "";
            tr.querySelector("[data-field='serialEnd']").value = "";
          } else {
            tr.remove();
          }
          updateSerialRows(card);
          updateSummary();
        });
        tr.querySelector("[data-action='addSerial']").addEventListener("click", () => {
          const body = tr.closest("[data-role='serialBody']");
          const lastEnd = Math.max(0, ...Array.from(body.querySelectorAll("[data-field='serialEnd']")).map((item) => Number(item.value || 0)));
          const start = Math.min(lastEnd + 1, 1500);
          const end = Math.min(start + 149, 1500);
          body.appendChild(createSerialRow({ start, end }, card));
          updateSerialRows(card);
          updateSummary();
        });
        return tr;
      }

      function updateIssueRows(body) {
        body.querySelectorAll("tr").forEach((row, index) => {
          row.querySelector("[data-field='issueNo']").value = index + 1;
        });
      }

      function createIssueRow(issue = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="readonly" data-field="issueNo" readonly /></td>
          <td><input data-field="machineTime" type="time" value="${issue.machineTime || ""}" /></td>
          <td><input data-field="materialBatch" value="${issue.materialBatch || ""}" placeholder="原料批次" /></td>
          <td><input data-field="supplier" value="${issue.supplier || ""}" placeholder="供应商" /></td>
          <td><textarea data-field="problem" placeholder="问题描述">${issue.problem || ""}</textarea></td>
          <td><button class="btn ghost" type="button" data-action="removeIssue">删除</button></td>
        `;
        tr.querySelectorAll("input, select, textarea").forEach((field) => {
          field.addEventListener("input", updateSummary);
          field.addEventListener("change", updateSummary);
        });
        tr.querySelector("[data-action='removeIssue']").addEventListener("click", () => {
          const body = tr.closest("[data-role='issueBody']");
          tr.remove();
          updateIssueRows(body);
          updateSummary();
        });
        return tr;
      }

      function createBatchCard(batch = {}) {
        const id = nextBatchId();
        const card = document.createElement("div");
        card.className = "batch-card";
        card.dataset.batchId = id;
        card.innerHTML = `
          <div class="batch-head">
            <div class="batch-title">
              <span class="batch-index"></span>
              <span>成品批次</span>
              <span class="muted batch-brief"></span>
            </div>
            <div class="batch-actions">
              <button class="btn" type="button" data-action="copyBatch">复制批次</button>
              <button class="btn danger" type="button" data-action="removeBatch">删除批次</button>
            </div>
          </div>
          <div class="batch-body">
            <div class="form-grid">
              <div class="field">
                <label><span class="required">*</span>成品批次</label>
                <input data-field="batchCode" value="${batch.batchCode || ""}" placeholder="请输入成品批次" />
              </div>
              <div class="field">
                <label>成品批号</label>
                <input data-field="lotNo" value="${batch.lotNo || ""}" placeholder="请输入成品批号" />
              </div>
              <div class="field">
                <label>对应成品箱号</label>
                <input class="readonly" data-field="boxSummary" value="点击查看箱序列号" readonly style="cursor:pointer;" />
              </div>
              <div class="field">
                <label><span class="required">*</span>隔离数量</label>
                <div style="display:flex;align-items:center;gap:6px;">
                  <input class="readonly" data-field="isolateQty" type="number" min="0" value="${batch.isolateQty || 0}" readonly />
                  <span class="muted">箱</span>
                </div>
              </div>
              <div style="display:none;">
                <table>
                  <tbody data-role="serialBody"></tbody>
                </table>
              </div>
              <div class="field wide">
                <label><span class="required">*</span>隔离原因</label>
                <textarea data-field="isolateReason" placeholder="请输入隔离原因">${batch.isolateReason || ""}</textarea>
              </div>
            </div>
            <div class="sub-title">
              <span>对应原料问题</span>
              <button class="btn primary" type="button" data-action="addIssue">添加原料问题</button>
            </div>
            <div class="table-wrap">
              <table class="editable-table">
                <thead>
                  <tr>
                    <th style="width: 70px;">序号</th>
                    <th style="width: 110px;">上机时间</th>
                    <th style="width: 150px;">原料批次</th>
                    <th style="width: 130px;">供应商</th>
                    <th>问题描述</th>
                    <th style="width: 70px;">操作</th>
                  </tr>
                </thead>
                <tbody data-role="issueBody"></tbody>
              </table>
            </div>
          </div>
        `;

        const issueBody = card.querySelector("[data-role='issueBody']");
        const issues = batch.issues && batch.issues.length ? batch.issues : [{}];
        issues.forEach((issue) => issueBody.appendChild(createIssueRow(issue)));
        updateIssueRows(issueBody);
        const serialBody = card.querySelector("[data-role='serialBody']");
        const serials = batch.boxSerials && batch.boxSerials.length ? batch.boxSerials : [{}];
        serials.forEach((serial) => serialBody.appendChild(createSerialRow(serial, card)));
        updateSerialRows(card);
        updateBatchQty(card);

        card.querySelectorAll("input, select, textarea").forEach((field) => {
          field.addEventListener("input", updateSummary);
          field.addEventListener("change", updateSummary);
        });
        card.querySelector("[data-action='addIssue']").addEventListener("click", () => {
          issueBody.appendChild(createIssueRow());
          updateIssueRows(issueBody);
          updateSummary();
        });
        card.querySelector("[data-field='boxSummary']").addEventListener("click", () => {
          openBoxModal(card);
        });
        card.querySelector("[data-action='removeBatch']").addEventListener("click", () => {
          if (document.querySelectorAll(".batch-card").length === 1) {
            showMessage("至少保留一个成品批次。", "error");
            return;
          }
          card.remove();
          updateSummary();
        });
        card.querySelector("[data-action='copyBatch']").addEventListener("click", () => {
          const copied = readBatch(card);
          copied.batchCode = `${copied.batchCode || "CP"}-COPY`;
          batchContainer.insertBefore(createBatchCard(copied), card.nextSibling);
          updateSummary();
        });
        return card;
      }

      function readBatch(card) {
        const get = (field) => card.querySelector(`[data-field="${field}"]`).value.trim();
        const serials = Array.from(card.querySelectorAll("[data-role='serialBody'] tr")).map((row) => ({
          start: Number(row.querySelector("[data-field='serialStart']").value || 0),
          end: Number(row.querySelector("[data-field='serialEnd']").value || 0)
        }));
        const issues = Array.from(card.querySelectorAll("[data-role='issueBody'] tr")).map((row) => ({
          machineTime: row.querySelector("[data-field='machineTime']").value,
          materialBatch: row.querySelector("[data-field='materialBatch']").value.trim(),
          supplier: row.querySelector("[data-field='supplier']").value.trim(),
          problem: row.querySelector("[data-field='problem']").value.trim()
        }));
        return {
          batchCode: get("batchCode"),
          lotNo: get("lotNo"),
          boxSerials: serials,
          isolateQty: Number(get("isolateQty") || 0),
          isolateReason: get("isolateReason"),
          issues
        };
      }

      function validateBatch(batch) {
        let missing = 0;
        if (!batch.batchCode) missing += 1;
        if (!batch.isolateQty) missing += 1;
        if (!batch.isolateReason) missing += 1;
        batch.boxSerials.forEach((serial) => {
          if (!serial.start || !serial.end || serial.end < serial.start) missing += 1;
        });
        batch.issues.forEach((issue) => {
          if (!issue.materialBatch) missing += 1;
          if (!issue.problem) missing += 1;
        });
        return missing;
      }

      function readAllBatches() {
        return Array.from(document.querySelectorAll(".batch-card")).map(readBatch);
      }

      function updateSummary() {
        const list = readAllBatches();
        const issueCount = list.reduce((sum, item) => sum + item.issues.length, 0);
        const totalQty = list.reduce((sum, item) => sum + Number(item.isolateQty || 0), 0);
        const missing = list.reduce((sum, item) => sum + validateBatch(item), 0);
        document.querySelector("#sumBatch").textContent = list.length;
        document.querySelector("#sumIssue").textContent = issueCount;
        document.querySelector("#sumQty").textContent = totalQty;
        document.querySelector("#sumMissing").textContent = missing;
        document.querySelectorAll(".batch-card").forEach((card, index) => {
          const batch = readBatch(card);
          card.querySelector(".batch-index").textContent = index + 1;
          card.querySelector(".batch-brief").textContent = batch.batchCode ? `${batch.batchCode} / ${batch.isolateQty || 0} 箱` : "未填写批次";
        });
      }

      function showMessage(text, type = "") {
        message.textContent = text;
        message.className = `message ${type}`;
      }

      function validateBase() {
        const fields = ["isolateDate", "shift", "team", "supervisor", "workshop", "type", "chemist", "productName"];
        return fields.filter((id) => !document.querySelector(`#${id}`).value.trim()).length;
      }

      function submitForm() {
        const baseMissing = validateBase();
        const batchMissing = readAllBatches().reduce((sum, item) => sum + validateBatch(item), 0);
        if (baseMissing + batchMissing > 0) {
          showMessage(`提交失败：仍有 ${baseMissing + batchMissing} 个必填项未完善。`, "error");
          updateSummary();
          return;
        }
        showMessage("原型动作：签字提交成功，单据状态变更为待审核。", "success");
      }

      document.querySelector("#addBatchBtn").addEventListener("click", () => {
        batchContainer.appendChild(createBatchCard());
        updateSummary();
      });
      document.querySelector("#saveBtn").addEventListener("click", () => {
        showMessage("原型动作：已保存草稿。", "success");
      });
      document.querySelector("#submitBtn").addEventListener("click", submitForm);
      document.querySelector("#reviewBtn").addEventListener("click", () => {
        showMessage("原型动作：打开签字复核窗口，获取登录账号所属签名。", "success");
      });
      document.querySelector("#reworkBtn").addEventListener("click", () => {
        document.querySelector("#result").value = "已发起返工";
        document.querySelector("#reworkNo").value = "FG20260706001";
        showMessage("原型动作：已发起返工，返工单号已反写。", "success");
      });
      document.querySelector("#noReworkBtn").addEventListener("click", () => {
        document.querySelector("#result").value = "无需返工";
        showMessage("原型动作：隔离结果已变更为无需返工。", "success");
      });
      document.querySelector("#deleteBtn").addEventListener("click", () => {
        showMessage("原型动作：暂存单据可删除，删除时同步删除批次与原料问题明细。", "error");
      });
      document.querySelector("#closeBoxModal").addEventListener("click", () => {
        closeBoxModal();
      });
      boxModal.addEventListener("click", (event) => {
        if (event.target === boxModal) {
          closeBoxModal();
        }
      });

      batches.forEach((batch) => batchContainer.appendChild(createBatchCard(batch)));
      updateSummary();
    </script>
  </body>
</html>
